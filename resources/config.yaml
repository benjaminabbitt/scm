ai:
  default_plugin: claude-code
  plugins:
    claude-code:
      binary_path: ""
      args:
        - --dangerously-skip-permissions
      env: {}
    gemini:
      binary_path: ""
      args:
        - --yolo
      env: {}

editor:
  command: vim

defaults:
  persona: developer

generators:
  git-context:
    description: Git repository information
    command: mlcm-gen-git-context
  simple:
    description: Wrapper that runs any command and outputs as fragment
    command: mlcm-gen-simple

personas:
  developer:
    description: Full development context with all standards and practices
    fragments:
      - general/communication
      - general/tdd
      - general/code-quality
      - tools/just
      - tools/git
      - general/documentation
      - general/problem-solving
      - general/pushback
      - general/security

  go-developer:
    description: Go development context
    tags:
      - golang
    fragments:
      - general/communication
      - general/tdd
      - general/code-quality
      - tools/just
      - tools/git
      - general/documentation
      - general/problem-solving
      - general/pushback
      - general/security

  python-developer:
    description: Python development context
    tags:
      - python
    fragments:
      - general/communication
      - general/tdd
      - general/code-quality
      - tools/just
      - tools/git
      - general/documentation
      - general/problem-solving
      - general/pushback
      - general/security

  rust-developer:
    description: Rust development context
    tags:
      - rust
    fragments:
      - general/communication
      - general/tdd
      - general/code-quality
      - tools/just
      - tools/git
      - general/documentation
      - general/problem-solving
      - general/pushback
      - general/security

  typescript-developer:
    description: TypeScript development context
    tags:
      - typescript
    fragments:
      - general/communication
      - general/tdd
      - general/code-quality
      - tools/just
      - tools/git
      - general/documentation
      - general/problem-solving
      - general/pushback
      - general/security

  reviewer:
    description: Code review with all perspectives
    tags:
      - review
    fragments:
      - general/communication
      - general/security

  git-aware:
    description: Context with git repository info
    fragments:
      - tools/git
    generators:
      - git-context

  prototype:
    description: Prototype mode - no backwards compatibility
    fragments:
      - patterns/prototype
      - general/communication
      - general/tdd
      - general/code-quality
